<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Token Usage Explorer</title>
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<style>
    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        margin: 24px;
        background: #fafafa;
        color: #222;
    }
    h1 { margin-top: 0; }
    .legend-key {
        display: inline-block;
        padding: 2px 10px;
        border-radius: 4px;
        margin-right: 8px;
        font-weight: 600;
    }
    .legend-tool  { background: #3498db; color: white; }
    .legend-judge { background: #e74c3c; color: white; }

    /* ---------- Larger, easier-to-grab slider ---------- */
    .slider-wrap {
        position: sticky;
        top: 0;
        z-index: 10;
        margin: 16px 0 24px 0;
        padding: 16px 20px 20px 20px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0,0,0,.10);
    }
    .slider-info {
        display: flex;
        justify-content: space-between;
        font-size: 15px;
        color: #555;
        margin-bottom: 10px;
    }
    .slider-info b { color: #222; }

    .slider-row {
        display: flex;
        align-items: center;
        gap: 14px;
    }
    .slider-row button {
        font-size: 18px;
        width: 44px;
        height: 44px;
        border-radius: 50%;
        border: 1px solid #ccc;
        background: #f5f5f5;
        cursor: pointer;
    }
    .slider-row button:hover { background: #e8e8e8; }
    .slider-row input[type=number] {
        width: 90px;
        padding: 8px;
        font-size: 16px;
        border: 1px solid #ccc;
        border-radius: 6px;
    }

    input[type=range].big-slider {
        flex: 1;
        -webkit-appearance: none;
        appearance: none;
        height: 18px;
        background: linear-gradient(to right, #3498db 0%, #3498db var(--pct, 100%), #e0e0e0 var(--pct, 100%), #e0e0e0 100%);
        border-radius: 9px;
        outline: none;
        cursor: pointer;
    }
    input[type=range].big-slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: #2471a3;
        border: 3px solid white;
        box-shadow: 0 2px 6px rgba(0,0,0,.25);
        cursor: grab;
    }
    input[type=range].big-slider::-webkit-slider-thumb:active { cursor: grabbing; }
    input[type=range].big-slider::-moz-range-thumb {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: #2471a3;
        border: 3px solid white;
        box-shadow: 0 2px 6px rgba(0,0,0,.25);
        cursor: grab;
    }

    .chart {
        background: white;
        border-radius: 8px;
        box-shadow: 0 1px 3px rgba(0,0,0,.08);
        padding: 8px;
    }
    /* 3-column horizontal layout: bars | tools | Judge.
       Each column has two rows (input on top, output on bottom). */
    .chart-grid {
        display: grid;
        grid-template-columns: 1.2fr 1fr 1fr;
        grid-template-rows: auto auto;
        gap: 18px;
        margin-bottom: 18px;
    }
    .chart { height: 420px; }
    @media (max-width: 1400px) {
        .chart-grid { grid-template-columns: 1fr 1fr 1fr; }
        .chart { height: 340px; }
    }
    @media (max-width: 640px) {
        /* Collapse to one column only on true phone widths. */
        .chart-grid { grid-template-columns: 1fr; }
        .chart { height: 320px; }
    }

    .totals {
        display: flex;
        gap: 18px;
        flex-wrap: wrap;
        font-size: 14px;
        margin-top: 12px;
    }
    .totals div {
        background: #fff;
        padding: 6px 12px;
        border-radius: 6px;
        border: 1px solid #eee;
    }
</style>
</head>
<body>
<h1>Token Usage Explorer</h1>
<p>
    <span class="legend-key legend-tool">tools</span>
    <span class="legend-key legend-judge">Judge</span>
    Drag the slider, click ◀/▶, or type a step number to walk through the
    session. Input and output tokens are shown on separate plots.
</p>

<div class="slider-wrap">
    <div class="slider-info">
        <span>Step <b id="stepNum">446</b> / 446</span>
        <span>Last entry: <b id="lastTool">—</b></span>
    </div>
    <div class="slider-row">
        <button id="prevBtn" title="previous step">◀</button>
        <input type="range" class="big-slider" id="stepSlider"
               min="1" max="446"
               value="446" step="1">
        <button id="nextBtn" title="next step">▶</button>
        <input type="number" id="stepInput"
               min="1" max="446" value="446"
               title="jump to step">
    </div>
    <div class="totals" id="totalsLine"></div>
</div>

<!-- 3-column horizontal layout.
     Column 1: per-tool bars (input row, output row).
     Column 2: tools cumulative line plots (input row, output row).
     Column 3: Judge cumulative line plots (input row, output row). -->
<div class="chart-grid">
    <div class="chart" id="barChartIn"></div>
    <div class="chart" id="toolLineIn"></div>
    <div class="chart" id="judgeLineIn"></div>

    <div class="chart" id="barChartOut"></div>
    <div class="chart" id="toolLineOut"></div>
    <div class="chart" id="judgeLineOut"></div>
</div>

_my_canvas", "inspect_my_canvas", "read_my_canvas", "calculate_lc", "write_my_canvas", "inspect_my_canvas", "read_my_canvas", "inspect_my_canvas", "read_my_canvas", "generate_structured_report", "generate_structured_report", "generate_structured_report", "write_my_canvas", "write_my_canvas", "Judge", "Judge", "Judge", "Judge", "Judge", "Judge", "Judge", "Judge", "Judge", "Judge", "Judge", "Judge", "Judge", "Judge", "Judge", "Judge", "Judge", "Judge", "Judge", "Judge", "Judge", "Judge", "Judge", "Judge", "Judge", "Judge", "Judge", "Judge", "Judge", "Judge", "Judge", "Judge", "Judge", "Judge", "Judge", "Judge", "inspect_my_canvas", "read_my_canvas", "read_my_canvas", "supervisor_get_available_report_names"], "has_judge": true};
const JUDGE_NAME  = "Judge";
const TOOL_COLOR  = "#3498db";
const JUDGE_COLOR = "#e74c3c";

const tools  = DATA.tools;
const nSteps = DATA.step_tools.length;

// Bar color per tool: blue for real tools, red only for the Judge bar.
const barColors = tools.map(t => t === JUDGE_NAME ? JUDGE_COLOR : TOOL_COLOR);

function snapshotAtStep(stepIdx) {
    const inVals  = tools.map(t => DATA.per_tool_cum[t][stepIdx].in);
    const outVals = tools.map(t => DATA.per_tool_cum[t][stepIdx].out);
    return { inVals, outVals };
}

const initIdx = nSteps - 1;
const init = snapshotAtStep(initIdx);

// ---------- Per-tool bar chart: INPUT tokens ------------------------------
Plotly.newPlot("barChartIn", [{
    x: tools, y: init.inVals,
    type: "bar", marker: { color: barColors }
}], {
    title: "Cumulative INPUT tokens per tool",
    xaxis: { title: "tool", tickangle: -55, automargin: true, tickfont: { size: 10 } },
    yaxis: { title: "input tokens" },
    margin: { t: 50, b: 140 }
}, { responsive: true });

// ---------- Per-tool bar chart: OUTPUT tokens -----------------------------
Plotly.newPlot("barChartOut", [{
    x: tools, y: init.outVals,
    type: "bar", marker: { color: barColors }
}], {
    title: "Cumulative OUTPUT tokens per tool",
    xaxis: { title: "tool", tickangle: -55, automargin: true, tickfont: { size: 10 } },
    yaxis: { title: "output tokens" },
    margin: { t: 50, b: 140 }
}, { responsive: true });

// ---------- Cumulative line plots ------------------------------------------
const xSteps = Array.from({length: nSteps}, (_, i) => i + 1);

function makeLinePlot(divId, title, xs, ys, color, yAxisTitle, initStep) {
    Plotly.newPlot(divId, [{
        x: xs, y: ys, mode: "lines",
        line: { color: color, width: 2 },
        showlegend: false
    }], {
        title: title,
        xaxis: { title: "step" },
        yaxis: { title: yAxisTitle },
        shapes: [{
            type: "line", x0: initStep, x1: initStep,
            y0: 0, y1: 1, yref: "paper",
            line: { color: "#888", width: 1, dash: "dash" }
        }],
        margin: { t: 50 }
    }, { responsive: true });
}

makeLinePlot("toolLineIn",   "Tools — cumulative INPUT",
             xSteps, DATA.tool_in_cum,   TOOL_COLOR,  "input tokens",  initIdx + 1);
makeLinePlot("toolLineOut",  "Tools — cumulative OUTPUT",
             xSteps, DATA.tool_out_cum,  TOOL_COLOR,  "output tokens", initIdx + 1);
makeLinePlot("judgeLineIn",  "Judge — cumulative INPUT",
             xSteps, DATA.judge_in_cum,  JUDGE_COLOR, "input tokens",  initIdx + 1);
makeLinePlot("judgeLineOut", "Judge — cumulative OUTPUT",
             xSteps, DATA.judge_out_cum, JUDGE_COLOR, "output tokens", initIdx + 1);

// ---------- Slider wiring --------------------------------------------------
const slider     = document.getElementById("stepSlider");
const stepInput  = document.getElementById("stepInput");
const stepNum    = document.getElementById("stepNum");
const lastTool   = document.getElementById("lastTool");
const totalsLine = document.getElementById("totalsLine");
const prevBtn    = document.getElementById("prevBtn");
const nextBtn    = document.getElementById("nextBtn");

const lineDivs = ["toolLineIn", "toolLineOut", "judgeLineIn", "judgeLineOut"];

function update(step) {
    step = Math.min(Math.max(step, 1), nSteps);
    const idx = step - 1;

    stepNum.textContent  = step;
    lastTool.textContent = DATA.step_tools[idx];
    slider.value         = step;
    stepInput.value      = step;

    // Update the slider's filled-portion gradient.
    const pct = ((step - 1) / Math.max(nSteps - 1, 1)) * 100;
    slider.style.setProperty("--pct", pct + "%");

    const snap = snapshotAtStep(idx);
    Plotly.restyle("barChartIn",  { y: [snap.inVals]  });
    Plotly.restyle("barChartOut", { y: [snap.outVals] });

    // Move the vertical "current step" marker on every line plot.
    const shapeUpdate = { "shapes[0].x0": step, "shapes[0].x1": step };
    lineDivs.forEach(id => Plotly.relayout(id, shapeUpdate));

    const tIn  = DATA.tool_in_cum[idx];
    const tOut = DATA.tool_out_cum[idx];
    const jIn  = DATA.judge_in_cum[idx];
    const jOut = DATA.judge_out_cum[idx];

    totalsLine.innerHTML = `
        <div style="border-color:${TOOL_COLOR}">
          tools — in: <b>${tIn.toLocaleString()}</b>,
          out: <b>${tOut.toLocaleString()}</b>,
          total: <b>${(tIn + tOut).toLocaleString()}</b>
        </div>
        <div style="border-color:${JUDGE_COLOR}">
          Judge — in: <b>${jIn.toLocaleString()}</b>,
          out: <b>${jOut.toLocaleString()}</b>,
          total: <b>${(jIn + jOut).toLocaleString()}</b>
        </div>
        <div>
          all — in: <b>${(tIn + jIn).toLocaleString()}</b>,
          out: <b>${(tOut + jOut).toLocaleString()}</b>,
          total: <b>${(tIn + tOut + jIn + jOut).toLocaleString()}</b>
        </div>
    `;
}

slider.addEventListener("input", e => update(parseInt(e.target.value, 10)));
stepInput.addEventListener("change", e => update(parseInt(e.target.value, 10) || 1));
prevBtn.addEventListener("click", () => update(parseInt(slider.value, 10) - 1));
nextBtn.addEventListener("click", () => update(parseInt(slider.value, 10) + 1));

slider.addEventListener("keydown", e => {
    if (e.key === "ArrowLeft")  { update(parseInt(slider.value, 10) - 1); e.preventDefault(); }
    if (e.key === "ArrowRight") { update(parseInt(slider.value, 10) + 1); e.preventDefault(); }
});

update(parseInt(slider.value, 10));
</script>
