<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Token Usage Explorer</title>
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<style>
    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        margin: 24px;
        background: #fafafa;
        color: #222;
    }
    h1 { margin-top: 0; }
    .legend-key {
        display: inline-block;
        padding: 2px 10px;
        border-radius: 4px;
        margin-right: 8px;
        font-weight: 600;
    }
    .legend-comm  { background: #e74c3c; color: white; }
    .legend-other { background: #3498db; color: white; }

    /* ---------- Larger, easier-to-grab slider ---------- */
    .slider-wrap {
        position: sticky;
        top: 0;
        z-index: 10;
        margin: 16px 0 24px 0;
        padding: 16px 20px 20px 20px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0,0,0,.10);
    }
    .slider-info {
        display: flex;
        justify-content: space-between;
        font-size: 15px;
        color: #555;
        margin-bottom: 10px;
    }
    .slider-info b { color: #222; }

    .slider-row {
        display: flex;
        align-items: center;
        gap: 14px;
    }
    .slider-row button {
        font-size: 18px;
        width: 44px;
        height: 44px;
        border-radius: 50%;
        border: 1px solid #ccc;
        background: #f5f5f5;
        cursor: pointer;
    }
    .slider-row button:hover { background: #e8e8e8; }
    .slider-row input[type=number] {
        width: 90px;
        padding: 8px;
        font-size: 16px;
        border: 1px solid #ccc;
        border-radius: 6px;
    }

    input[type=range].big-slider {
        flex: 1;
        -webkit-appearance: none;
        appearance: none;
        height: 18px;
        background: linear-gradient(to right, #3498db 0%, #3498db var(--pct, 100%), #e0e0e0 var(--pct, 100%), #e0e0e0 100%);
        border-radius: 9px;
        outline: none;
        cursor: pointer;
    }
    input[type=range].big-slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: #2471a3;
        border: 3px solid white;
        box-shadow: 0 2px 6px rgba(0,0,0,.25);
        cursor: grab;
    }
    input[type=range].big-slider::-webkit-slider-thumb:active { cursor: grabbing; }
    input[type=range].big-slider::-moz-range-thumb {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: #2471a3;
        border: 3px solid white;
        box-shadow: 0 2px 6px rgba(0,0,0,.25);
        cursor: grab;
    }

    .chart {
        background: white;
        border-radius: 8px;
        box-shadow: 0 1px 3px rgba(0,0,0,.08);
        margin-bottom: 18px;
        padding: 8px;
    }
    .chart-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 18px;
        margin-bottom: 18px;
    }
    .chart-row .chart { margin-bottom: 0; }
    @media (max-width: 640px) {
        /* Collapse to one column only on true phone widths. */
        .chart-row { grid-template-columns: 1fr; }
    }

    .totals {
        display: flex;
        gap: 18px;
        flex-wrap: wrap;
        font-size: 14px;
        margin-top: 12px;
    }
    .totals div {
        background: #fff;
        padding: 6px 12px;
        border-radius: 6px;
        border: 1px solid #eee;
    }
</style>
</head>
<body>
<h1>Token Usage Explorer</h1>
<p>
    <span class="legend-key legend-comm">comm tools</span>
    <span class="legend-key legend-other">other tools</span>
    Drag the slider, click ◀/▶, or type a step number to walk through the
    session. Input and output tokens are shown on separate plots.
</p>

<div class="slider-wrap">
    <div class="slider-info">
        <span>Step <b id="stepNum">656</b> / 656</span>
        <span>Last tool: <b id="lastTool">—</b></span>
    </div>
    <div class="slider-row">
        <button id="prevBtn" title="previous step">◀</button>
        <input type="range" class="big-slider" id="stepSlider"
               min="1" max="656"
               value="656" step="1">
        <button id="nextBtn" title="next step">▶</button>
        <input type="number" id="stepInput"
               min="1" max="656" value="656"
               title="jump to step">
    </div>
    <div class="totals" id="totalsLine"></div>
</div>

<!-- Per-tool bar charts (input vs output, side-by-side) -->
<div class="chart-row">
    <div class="chart" id="barChartIn"  style="height: 460px;"></div>
    <div class="chart" id="barChartOut" style="height: 460px;"></div>
</div>

<!-- Cumulative line plots: input on the left, output on the right -->
<div class="chart-row">
    <div class="chart" id="commLineIn"   style="height: 320px;"></div>
    <div class="chart" id="commLineOut"  style="height: 320px;"></div>
</div>
<div class="chart-row">
    <div class="chart" id="otherLineIn"  style="height: 320px;"></div>
    <div class="chart" id="otherLineOut" style="height: 320px;"></div>
</div>

mit_dft_job", "get_terminations_ranking", "submit_dft_job", "get_terminations_ranking", "submit_dft_job", "get_terminations_ranking", "submit_dft_job", "get_terminations_ranking", "submit_dft_job", "get_terminations_ranking", "submit_dft_job", "get_terminations_ranking", "submit_dft_job", "get_terminations_ranking", "submit_dft_job", "get_terminations_ranking", "submit_dft_job", "get_terminations_ranking", "submit_dft_job", "get_terminations_ranking", "submit_dft_job", "get_terminations_ranking", "submit_dft_job", "get_terminations_ranking", "submit_dft_job", "get_terminations_ranking", "submit_dft_job", "get_terminations_ranking", "submit_dft_job", "get_terminations_ranking", "submit_dft_job", "get_terminations_ranking", "submit_dft_job", "get_terminations_ranking", "submit_dft_job", "get_terminations_ranking"]};
const COMM_TOOLS = new Set(["browse_df", "check_time", "inspect_explog", "inspect_my_canvas", "query_explog", "read_explog", "read_my_canvas", "wait_for_update", "write_my_canvas"]);
const COMM_COLOR  = "#e74c3c";
const OTHER_COLOR = "#3498db";

const tools  = DATA.tools;
const nSteps = DATA.step_tools.length;

// Per-tool bar colors based on group membership.
const barColors = tools.map(t => COMM_TOOLS.has(t) ? COMM_COLOR : OTHER_COLOR);

function snapshotAtStep(stepIdx) {
    const inVals  = tools.map(t => DATA.per_tool_cum[t][stepIdx].in);
    const outVals = tools.map(t => DATA.per_tool_cum[t][stepIdx].out);
    return { inVals, outVals };
}

const initIdx = nSteps - 1;
const init = snapshotAtStep(initIdx);

// ---------- Per-tool bar chart: INPUT tokens ------------------------------
Plotly.newPlot("barChartIn", [{
    x: tools, y: init.inVals,
    type: "bar", marker: { color: barColors }
}], {
    title: "Cumulative INPUT tokens per tool (through current step)",
    xaxis: { title: "tool", tickangle: -35, automargin: true },
    yaxis: { title: "input tokens" },
    margin: { t: 50, b: 120 }
}, { responsive: true });

// ---------- Per-tool bar chart: OUTPUT tokens -----------------------------
Plotly.newPlot("barChartOut", [{
    x: tools, y: init.outVals,
    type: "bar", marker: { color: barColors }
}], {
    title: "Cumulative OUTPUT tokens per tool (through current step)",
    xaxis: { title: "tool", tickangle: -35, automargin: true },
    yaxis: { title: "output tokens" },
    margin: { t: 50, b: 120 }
}, { responsive: true });

// ---------- Cumulative line plots ------------------------------------------
const xSteps = Array.from({length: nSteps}, (_, i) => i + 1);

function makeLinePlot(divId, title, xs, ys, color, yAxisTitle, initStep) {
    Plotly.newPlot(divId, [{
        x: xs, y: ys, mode: "lines",
        line: { color: color, width: 2 },
        showlegend: false
    }], {
        title: title,
        xaxis: { title: "step" },
        yaxis: { title: yAxisTitle },
        shapes: [{
            type: "line", x0: initStep, x1: initStep,
            y0: 0, y1: 1, yref: "paper",
            line: { color: "#888", width: 1, dash: "dash" }
        }],
        margin: { t: 50 }
    }, { responsive: true });
}

makeLinePlot("commLineIn",   "Cumulative INPUT tokens — comm tools",
             xSteps, DATA.comm_in_cum,   COMM_COLOR,  "input tokens",  initIdx + 1);
makeLinePlot("commLineOut",  "Cumulative OUTPUT tokens — comm tools",
             xSteps, DATA.comm_out_cum,  COMM_COLOR,  "output tokens", initIdx + 1);
makeLinePlot("otherLineIn",  "Cumulative INPUT tokens — other tools",
             xSteps, DATA.other_in_cum,  OTHER_COLOR, "input tokens",  initIdx + 1);
makeLinePlot("otherLineOut", "Cumulative OUTPUT tokens — other tools",
             xSteps, DATA.other_out_cum, OTHER_COLOR, "output tokens", initIdx + 1);

// ---------- Slider wiring --------------------------------------------------
const slider     = document.getElementById("stepSlider");
const stepInput  = document.getElementById("stepInput");
const stepNum    = document.getElementById("stepNum");
const lastTool   = document.getElementById("lastTool");
const totalsLine = document.getElementById("totalsLine");
const prevBtn    = document.getElementById("prevBtn");
const nextBtn    = document.getElementById("nextBtn");

const lineDivs = ["commLineIn", "commLineOut", "otherLineIn", "otherLineOut"];

function update(step) {
    step = Math.min(Math.max(step, 1), nSteps);
    const idx = step - 1;

    stepNum.textContent  = step;
    lastTool.textContent = DATA.step_tools[idx];
    slider.value         = step;
    stepInput.value      = step;

    // Update the slider's filled-portion gradient.
    const pct = ((step - 1) / Math.max(nSteps - 1, 1)) * 100;
    slider.style.setProperty("--pct", pct + "%");

    const snap = snapshotAtStep(idx);
    Plotly.restyle("barChartIn",  { y: [snap.inVals]  });
    Plotly.restyle("barChartOut", { y: [snap.outVals] });

    // Move the vertical "current step" marker on every line plot.
    const shapeUpdate = { "shapes[0].x0": step, "shapes[0].x1": step };
    lineDivs.forEach(id => Plotly.relayout(id, shapeUpdate));

    const cIn  = DATA.comm_in_cum[idx];
    const cOut = DATA.comm_out_cum[idx];
    const oIn  = DATA.other_in_cum[idx];
    const oOut = DATA.other_out_cum[idx];

    totalsLine.innerHTML = `
        <div style="border-color:${COMM_COLOR}">
          comm — in: <b>${cIn.toLocaleString()}</b>,
          out: <b>${cOut.toLocaleString()}</b>,
          total: <b>${(cIn + cOut).toLocaleString()}</b>
        </div>
        <div style="border-color:${OTHER_COLOR}">
          other — in: <b>${oIn.toLocaleString()}</b>,
          out: <b>${oOut.toLocaleString()}</b>,
          total: <b>${(oIn + oOut).toLocaleString()}</b>
        </div>
        <div>
          all — in: <b>${(cIn + oIn).toLocaleString()}</b>,
          out: <b>${(cOut + oOut).toLocaleString()}</b>,
          total: <b>${(cIn + cOut + oIn + oOut).toLocaleString()}</b>
        </div>
    `;
}

slider.addEventListener("input", e => update(parseInt(e.target.value, 10)));
stepInput.addEventListener("change", e => update(parseInt(e.target.value, 10) || 1));
prevBtn.addEventListener("click", () => update(parseInt(slider.value, 10) - 1));
nextBtn.addEventListener("click", () => update(parseInt(slider.value, 10) + 1));

// Arrow-key navigation when the slider has focus.
slider.addEventListener("keydown", e => {
    if (e.key === "ArrowLeft")  { update(parseInt(slider.value, 10) - 1); e.preventDefault(); }
    if (e.key === "ArrowRight") { update(parseInt(slider.value, 10) + 1); e.preventDefault(); }
});

update(parseInt(slider.value, 10));
</script>
