    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

    :root {
      --bg:         #0d0f14;
      --surface:    #151821;
      --border:     #252a38;
      --accent:     #4f8ef7;
      --accent-dim: #1e3a6e;
      --accent2:    #7f5af0;
      --text:       #e2e8f0;
      --muted:      #64748b;
      --green:      #4ade80;
      --green-dim:  #14301a;
      --pin-border: #f59e0b;
      --pin-dim:    #2d1f00;
      --font-mono:  'Fira Code','Cascadia Code','Consolas',monospace;
      --font-sans:  'DM Sans','Segoe UI',sans-serif;
    }

    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Fira+Code:wght@400;500&display=swap');

    body {
      background:var(--bg); color:var(--text); font-family:var(--font-sans);
      height:100vh; display:flex; flex-direction:column; overflow:hidden;
    }

    /* ── Header ── */
    header {
      display:flex; align-items:center; justify-content:space-between;
      padding:14px 24px; background:var(--surface);
      border-bottom:1px solid var(--border); gap:24px; flex-shrink:0;
    }
    .brand { display:flex; align-items:center; gap:10px; }
    .brand-icon {
      width:32px; height:32px;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:16px;
    }
    h1 { font-size:15px; font-weight:600; letter-spacing:.02em; }
    .stats { display:flex; gap:6px; }
    .stat {
      background:var(--bg); border:1px solid var(--border); border-radius:6px;
      padding:4px 12px; font-size:12px; font-family:var(--font-mono); color:var(--muted);
    }
    .stat span { color:var(--accent); font-weight:500; }
    .toolbar { display:flex; gap:8px; }
    .btn {
      background:var(--surface); border:1px solid var(--border); color:var(--muted);
      border-radius:6px; padding:5px 12px; font-size:12px; cursor:pointer;
      transition:all .15s; font-family:var(--font-sans);
    }
    .btn:hover { border-color:var(--accent); color:var(--accent); }

    /* ── Main layout ── */
    main { display:flex; flex:1; overflow:hidden; position:relative; }

    #graph { flex:1; background:var(--bg); position:relative; }
    #graph::before {
      content:''; position:absolute; inset:0;
      background-image:
        linear-gradient(var(--border) 1px,transparent 1px),
        linear-gradient(90deg,var(--border) 1px,transparent 1px);
      background-size:40px 40px; opacity:.3; pointer-events:none;
    }

    /* ── SVG overlay for connecting strings ── */
    #svg-overlay {
      position:fixed; top:0; left:0; width:100vw; height:100vh;
      pointer-events:none; z-index:998;
    }

    /* ── Side panel ── */
    aside {
      width:300px; background:var(--surface); border-left:1px solid var(--border);
      display:flex; flex-direction:column; overflow:hidden; flex-shrink:0;
    }
    .panel-title {
      font-size:11px; font-weight:600; letter-spacing:.08em; text-transform:uppercase;
      color:var(--muted); padding:14px 16px 8px; border-bottom:1px solid var(--border);
    }
    #node-detail { padding:16px; font-size:13px; flex:1; overflow-y:auto; min-height:0; }
    .detail-empty { color:var(--muted); font-style:italic; font-size:12px; margin-top:4px; }
    .detail-field { margin-bottom:14px; }
    .detail-label {
      font-size:10px; text-transform:uppercase; letter-spacing:.08em;
      color:var(--muted); margin-bottom:4px;
    }
    .detail-value {
      font-family:var(--font-mono); font-size:12px; color:var(--text);
      background:var(--bg); border:1px solid var(--border);
      border-radius:5px; padding:6px 8px; word-break:break-all;
    }
    .detail-text {
      font-size:12px; color:var(--text); line-height:1.6;
      background:var(--bg); border:1px solid var(--border);
      border-radius:5px; padding:8px; white-space:pre-wrap; word-break:break-word;
    }
    .tag-list { display:flex; flex-wrap:wrap; gap:4px; margin-top:4px; }
    .tag {
      background:var(--accent-dim); color:var(--accent);
      border-radius:4px; padding:2px 7px; font-family:var(--font-mono); font-size:11px;
    }
    .tag.green { background:var(--green-dim); color:var(--green); }
    .kv-table { width:100%; border-collapse:collapse; font-size:11px; font-family:var(--font-mono); }
    .kv-table td {
      padding:4px 6px; border:1px solid var(--border);
      vertical-align:top; word-break:break-word;
    }
    .kv-table td:first-child { color:var(--accent); white-space:nowrap; width:35%; }

    /* ── Topo list ── */
    #topo-list {
      padding:8px 16px 16px; overflow-y:auto;
      display:flex; flex-direction:column; gap:3px;
      max-height:200px; min-height:0; flex-shrink:0;
    }
    .topo-item {
      display:flex; align-items:center; gap:8px; padding:5px 8px; border-radius:5px;
      cursor:pointer; transition:background .1s; font-size:12px; font-family:var(--font-mono);
    }
    .topo-item:hover { background:var(--border); }
    .topo-item.selected { background:var(--accent-dim); color:var(--accent); }
    .topo-idx { font-size:10px; color:var(--muted); min-width:22px; text-align:right; }
    .topo-id  { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .depth-badge {
      font-size:10px; background:var(--border); border-radius:3px; padding:1px 5px; color:var(--muted);
    }

    /* ── Shared popup anatomy ── */
    .popup-base {
      position:fixed; z-index:1000; width:340px;
      background:var(--surface);
      border-radius:10px; box-shadow:0 8px 32px #00000090;
      overflow:hidden; font-size:13px;
      transition:opacity .12s, transform .12s;
    }
    .popup-header {
      display:flex; align-items:center; justify-content:space-between;
      padding:9px 13px; cursor:move; user-select:none;
      border-bottom:1px solid var(--border); gap:8px;
    }
    .popup-tool-name {
      font-family:var(--font-mono); font-size:13px; font-weight:600;
      flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
    }
    .popup-hint { font-size:10px; color:var(--muted); letter-spacing:.04em; flex-shrink:0; }
    .popup-close-btn {
      background:none; border:none; color:var(--muted); cursor:pointer;
      font-size:15px; line-height:1; padding:0 2px; transition:color .15s; flex-shrink:0;
    }
    .popup-close-btn:hover { color:var(--text); }
    .popup-body {
      padding:12px 14px; display:flex; flex-direction:column; gap:10px;
      max-height:380px; overflow-y:auto;
    }
    .popup-field { display:flex; flex-direction:column; gap:3px; }
    .popup-label { font-size:10px; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); }
    .popup-value {
      font-family:var(--font-mono); font-size:12px; color:var(--text);
      background:var(--bg); border:1px solid var(--border);
      border-radius:4px; padding:5px 8px; word-break:break-all; white-space:pre-wrap;
    }
    .popup-divider { height:1px; background:var(--border); margin:2px 0; }

    /* hover popup: blue border, semi-transparent */
    #hover-popup {
      border:1px solid var(--accent);
      pointer-events:none;         /* never intercepts mouse during hover */
      opacity:0; transform:translateY(4px);
    }
    #hover-popup.visible {
      opacity:1; transform:translateY(0);
    }
    #hover-popup .popup-header { background:var(--accent-dim); cursor:default; }
    #hover-popup .popup-tool-name { color:var(--accent); }

    /* pinned popup: amber border, fully interactive */
    .pinned-popup {
      border:1px solid var(--pin-border);
    }
    .pinned-popup .popup-header { background:var(--pin-dim); }
    .pinned-popup .popup-tool-name { color:var(--pin-border); }
    .pin-icon { font-size:13px; flex-shrink:0; }

    /* scrollbar */
    ::-webkit-scrollbar { width:5px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
  </style>
</head>

    "reasons": {
      "sweeping_parameter": "Context: Convergence test for kspacing to determine the optimal k-point density for BCC Li lattice constant calculation using PBE functional. This test characterizes the kspacing parameter while all other DFT parameters (ecutwfc=80 Ry, methfessel-paxton smearing with degauss=0.02 Ry) are held at tight defaults.\n\nRationale: This is the parameter being varied in the convergence test. Kspacing controls the k-point density in reciprocal space, which is critical for metallic BCC Li to accurately sample the Fermi surface. This convergence test characterizes how fine the k-point mesh needs to be to achieve converged total energies.",
      "filename": "Context: Convergence test for kspacing to determine the optimal k-point density for BCC Li lattice constant calculation using PBE functional. This test characterizes the kspacing parameter while all other DFT parameters (ecutwfc=80 Ry, methfessel-paxton smearing with degauss=0.02 Ry) are held at tight defaults.\n\nRationale: These are the output files (.pwo) from the kspacing convergence test batch. Each file corresponds to one kspacing value (0.1, 0.15, 0.2, 0.25, 0.3, 0.35, 0.4 Angstrom^-1). The files were generated by the generate_convergence_test tool (refs: ex0qllxl, pqvaxyom, em3kkuh0, hp7g87co, yqotxlpe, pvjt06wm, 1nnz4wis) and successfully completed as confirmed by the HPC_Agent. The tool will automatically read the corresponding .pwo output files to extract total energies.",
      "parameters": "Context: Convergence test for kspacing to determine the optimal k-point density for BCC Li lattice constant calculation using PBE functional. This test characterizes the kspacing parameter while all other DFT parameters (ecutwfc=80 Ry, methfessel-paxton smearing with degauss=0.02 Ry) are held at tight defaults.\n\nRationale: These are the kspacing values tested in the convergence sweep, ranging from 0.1 (finest, most expensive) to 0.4 (coarsest, cheapest) Angstrom^-1. Each value corresponds to the kspacing parameter used in the aligned filename. The references point to the generate_convergence_test output that created each job with its specific kspacing value.",
      "reference_file": "Context: Convergence test for kspacing to determine the optimal k-point density for BCC Li lattice constant calculation using PBE functional. This test characterizes the kspacing parameter while all other DFT parameters (ecutwfc=80 Ry, methfessel-paxton smearing with degauss=0.02 Ry) are held at tight defaults.\n\nRationale: This is the most expensive and most accurate calculation in the convergence test, using kspacing=0.1 Angstrom^-1 (finest k-point mesh). It serves as the reference against which all other calculations are compared to determine the optimal (cheapest) kspacing that still achieves the required accuracy.",
      "threshold": "Context: Convergence test for kspacing to determine the optimal k-point density for BCC Li lattice constant calculation using PBE functional. This test characterizes the kspacing parameter while all other DFT parameters (ecutwfc=80 Ry, methfessel-paxton smearing with degauss=0.02 Ry) are held at tight defaults.\n\nRationale: This is the maximum allowed energy difference per atom from the reference calculation. For lattice constant calculations, 1 meV/atom (0.001 eV/atom) is a standard tight convergence criterion that ensures the lattice constant will be accurate to within ~0.01 Angstrom. This threshold is appropriate for BCC Li given the analysis documented on CANVAS.",
      "comparison_mode": "Context: Convergence test for kspacing to determine the optimal k-point density for BCC Li lattice constant calculation using PBE functional. This test characterizes the kspacing parameter while all other DFT parameters (ecutwfc=80 Ry, methfessel-paxton smearing with degauss=0.02 Ry) are held at tight defaults.\n\nRationale: Per-atom comparison is used because it normalizes the energy difference by the number of atoms in the unit cell (2 atoms for BCC Li). This makes the convergence criterion independent of system size and directly relates to the physical accuracy needed for lattice constant determination."

    "children_ids": [],
    "value": "# Scientific Report\n\n## Overall Goal\n\nDetermine the optimal kspacing value for BCC Li lattice constant calculation using DFT with PBE functional through systematic convergence testing. The optimal value must balance computational cost with accuracy, achieving convergence within 1 meV/atom compared to the reference calculation.\n\n## Quantities Sought\n\n- **optimal_kspacing** = 0.2 Angstrom^-1  (varied: kspacing)  \u2014 Optimal k-point spacing determined from convergence test on BCC Li, converged within 1 meV/atom threshold [^optimal_kspacing]\n\n## Qualitative Findings\n\nA systematic kspacing convergence test was performed on BCC Li using the PBE functional with methfessel-paxton smearing (degauss=0.02 Ry) and ecutwfc=80 Ry. Seven kspacing values were tested ranging from 0.1 to 0.4 Angstrom^-1. The convergence criterion was set to 1 meV/atom per-atom energy difference from the reference calculation (kspacing=0.1 Angstrom^-1, the finest mesh). The analysis identified kspacing=0.2 Angstrom^-1 [^optimal_kspacing] Angstrom^-1 as the optimal value, representing the cheapest computational setting that achieves the required accuracy for lattice constant calculations. This value will be used in subsequent ecutwfc convergence tests and production runs for the BCC Li lattice constant determination.\n\n## Conclusion\n\nThe kspacing convergence test successfully identified 0.2 Angstrom^-1 [^optimal_kspacing] Angstrom^-1 as the optimal k-point spacing for BCC Li lattice constant calculations. This value provides the necessary accuracy (within 1 meV/atom of the reference) while minimizing computational cost. The converged kspacing value is now certified and ready for use in the next phase of the workflow: ecutwfc convergence testing.\n\n## References\n\n[^optimal_kspacing]: **optimal_kspacing** = 0.2 Angstrom^-1, source artifact `h1yno41s` \u2014 Optimal k-point spacing determined from convergence test on BCC Li, converged within 1 meV/atom threshold\n",

      "occupations": "Context: Initial template for DFT parameter convergence tests on BCC Li. This template will be used to generate convergence test input files for kspacing and ecutwfc optimization.\n\nRationale: This parameter is set to 'smearing' because BCC Li is a metallic system with partially filled bands at the Fermi level. Smearing is essential for proper convergence of metallic systems by smoothing the discontinuous occupations at the Fermi surface.",

      "degauss": "Context: Initial template for DFT parameter convergence tests on BCC Li. This template will be used to generate convergence test input files for kspacing and ecutwfc optimization.\n\nRationale: This parameter is held fixed at 0.02 Ry (approximately 0.27 eV) during the kspacing and ecutwfc convergence tests to isolate those parameters. The value 0.02 Ry is a standard choice for metallic systems that provides good balance between accuracy and convergence stability. By keeping degauss constant in the template, we ensure that variations in total energy during convergence tests arise solely from changes in the parameter being characterized (kspacing or ecutwfc), not from smearing effects.",
      "conv_thr": "Context: Initial template for DFT parameter convergence tests on BCC Li. This template will be used to generate convergence test input files for kspacing and ecutwfc optimization.\n\nRationale: This parameter is set to 1e-6 as a tight convergence threshold for the self-consistent loop. This stringent criterion ensures high-quality energies for convergence analysis, allowing us to reliably detect small energy differences (target: 1 meV/atom) between different parameter settings.",

    "value": "# Scientific Report\n\n## Overall Goal\n\nDetermine the optimal kspacing value for BCC Li DFT calculations using PBE functional through systematic convergence testing. The optimal value must achieve total energy convergence within 1 meV/atom compared to the reference calculation while minimizing computational cost. This kspacing value will be used in all subsequent calculations including ecutwfc convergence tests, structure relaxation, and equation of state calculations for lattice constant determination.\n\n## Quantities Sought\n\n- **optimal_kspacing_Angstrom** = 0.2 Angstrom^-1  (varied: kspacing)  \u2014 Optimal k-point sampling density for BCC Li that achieves 1 meV/atom convergence criterion [^optimal_kspacing_Angstrom]\n\n## Qualitative Findings\n\nA systematic convergence test was performed on BCC Li using the PBE functional to determine the optimal kspacing value. Seven kspacing values were tested ranging from 0.1 to 0.4 inverse Angstrom. All calculations used fixed parameters: ecutwfc=80 Ry, methfessel-paxton smearing with degauss=0.02 Ry, appropriate for the metallic nature of BCC Li. The convergence test was based on the updated template (ref: stmx04hh) with corrected degauss rationale. The reference calculation used kspacing=0.1 inverse Angstrom (finest k-point sampling) to establish the most accurate baseline. Total energies were compared in per-atom mode with a convergence threshold of 1 meV/atom (0.001 eV/atom). The analysis identified kspacing=0.2 Angstrom^-1 [^optimal_kspacing_Angstrom] inverse Angstrom as the optimal value - the cheapest setting that maintains the required accuracy.\n\n## Conclusion\n\nThe optimal kspacing for BCC Li DFT calculations using PBE functional is 0.2 Angstrom^-1 [^optimal_kspacing_Angstrom] inverse Angstrom. This value achieves the 1 meV/atom convergence criterion while minimizing computational cost. The determination is based on 7 systematic convergence test calculations with proper provenance tracing back to the corrected template. This kspacing value will be used in all subsequent BCC Li calculations including ecutwfc convergence tests, structure relaxation, and equation of state calculations for lattice constant determination.\n\n## References\n\n[^optimal_kspacing_Angstrom]: **optimal_kspacing_Angstrom** = 0.2 Angstrom^-1, source artifact `i10gdmuz` \u2014 Optimal k-point sampling density for BCC Li that achieves 1 meV/atom convergence criterion\n",

    "children_ids": [],
    "value": "# Scientific Report\n\n## Overall Goal\n\nDetermine the optimal plane-wave kinetic energy cutoff (ecutwfc) for BCC Li DFT calculations using PBE functional through systematic convergence testing. The goal is to identify the most computationally efficient ecutwfc value that maintains total energy convergence within 1 meV/atom compared to a highly converged reference calculation, ensuring accurate lattice constant determination while minimizing computational cost.\n\n## Quantities Sought\n\n- **optimal_ecutwfc_Ry** = 40 Ry  (varied: ecutwfc)  \u2014 Optimal plane-wave kinetic energy cutoff determined from convergence test with 1 meV/atom threshold [^optimal_ecutwfc_Ry]\n\n## Qualitative Findings\n\nA systematic convergence test was performed on BCC Li using PBE functional with USPP pseudopotential (li_pbe_v1.4.uspp.F.UPF). Seven ecutwfc values were tested: 40, 50, 60, 70, 80, 90, and 100 Ry. All calculations used the optimal kspacing of 0.2 Angstrom to the power of -1 (previously determined from kspacing convergence test), methfessel-paxton smearing with degauss equal to 0.02 Ry, and scf calculation type. The convergence criterion was set to 1 meV/atom (0.001 eV/atom) in per-atom comparison mode, with ecutwfc equal to 100 Ry serving as the reference (most expensive/accurate) calculation. The find_optimal_parameter tool analyzed the total energies from all seven calculations and determined that 40 Ry [^optimal_ecutwfc_Ry] is the cheapest setting that achieves the required convergence threshold. This result indicates that BCC Li with PBE functional and USPP pseudopotential converges rapidly with respect to plane-wave cutoff energy, allowing for efficient production calculations.\n\n## Conclusion\n\nThe optimal ecutwfc for BCC Li lattice constant calculations using PBE functional is 40 Ry [^optimal_ecutwfc_Ry], meeting the 1 meV/atom convergence criterion. This value, combined with the previously determined optimal kspacing of 0.2 Angstrom to the power of -1, establishes the complete set of converged DFT parameters needed for production runs including structure relaxation and equation of state calculations to determine the lattice constant.\n\n## References\n\n[^optimal_ecutwfc_Ry]: **optimal_ecutwfc_Ry** = 40 Ry, source artifact `d1hokozn` \u2014 Optimal plane-wave kinetic energy cutoff determined from convergence test with 1 meV/atom threshold\n",

function placeHoverPopup(clientX, clientY) {
  const pw = 340, ph = hoverPopup.offsetHeight || 240;
  const vw = window.innerWidth, vh = window.innerHeight;
  let left = clientX + 52, top = clientY - 80;
  if (left + pw > vw - 8) left = clientX - pw - 52;
  if (top + ph > vh - 8)  top  = vh - ph - 8;

  hoverPopup.style.left = left + "px";
  hoverPopup.style.top  = top  + "px";

const PINNED     = {};
const svgOverlay = document.getElementById("svg-overlay");
let   zTop       = 1000;

function nextZ() { return ++zTop; }

/** Nearest point on popup border toward (tx, ty). */
function borderPoint(rect, tx, ty) {
  const cx = rect.left + rect.width  / 2;
  const cy = rect.top  + rect.height / 2;
  const dx = tx - cx, dy = ty - cy;
  if (dx === 0 && dy === 0) return { x: cx, y: cy };
  let t = Infinity;
  if (dx > 0)  t = Math.min(t, (rect.right  - cx) / dx);
  else if (dx < 0) t = Math.min(t, (rect.left - cx) / dx);
  if (dy > 0)  t = Math.min(t, (rect.bottom - cy) / dy);
  else if (dy < 0) t = Math.min(t, (rect.top  - cy) / dy);
  return { x: cx + dx * t, y: cy + dy * t };
}

function buildPath(rect, nx, ny) {
  const bp  = borderPoint(rect, nx, ny);
  // control point: midpoint pulled slightly perpendicular for a gentle curve
  const mx  = (bp.x + nx) / 2;
  const my  = (bp.y + ny) / 2;
  const len = Math.hypot(nx - bp.x, ny - bp.y);
  const perp = len * 0.2;
  // perpendicular offset (rotate direction 90°)
  const ux = -(ny - bp.y) / (len || 1);
  const uy =  (nx - bp.x) / (len || 1);
  const cpx = mx + ux * perp;
  const cpy = my + uy * perp;
  return `M ${bp.x.toFixed(1)},${bp.y.toFixed(1)} Q ${cpx.toFixed(1)},${cpy.toFixed(1)} ${nx.toFixed(1)},${ny.toFixed(1)}`;
}

function updateLine(nid) {
  const entry = PINNED[nid];
  if (!entry) return;
  const pr = entry.el.getBoundingClientRect();
  if (pr.width === 0) return;
  const { x: nx, y: ny } = nodeViewportPos(nid);
  entry.path.setAttribute("d", buildPath(pr, nx, ny));
}

// Continuous rAF loop — keeps all lines correct during drag, pan, zoom, animation
function lineLoop() {
  Object.keys(PINNED).forEach(updateLine);
  requestAnimationFrame(lineLoop);
}
requestAnimationFrame(lineLoop);

function makeDraggable(el, nid) {
  let drag = false, ox = 0, oy = 0;
  const header = el.querySelector(".popup-header");
  header.addEventListener("mousedown", e => {
    if (e.target.classList.contains("popup-close-btn")) return;
    drag = true;
    el.style.zIndex = nextZ();
    const r = el.getBoundingClientRect();
    ox = e.clientX - r.left;
    oy = e.clientY - r.top;
    e.preventDefault();
  });
  document.addEventListener("mousemove", e => {
    if (!drag) return;
    el.style.left   = (e.clientX - ox) + "px";
    el.style.top    = (e.clientY - oy) + "px";
    el.style.right  = "auto";
    el.style.bottom = "auto";
  });
  document.addEventListener("mouseup", () => { drag = false; });
}

function pinNode(nid, spawnX, spawnY) {
  if (PINNED[nid]) {
    PINNED[nid].el.style.zIndex = nextZ();
    return;
  }

  const d = NODE_DATA[nid];

  const el = document.createElement("div");
  el.className    = "popup-base pinned-popup";
  el.style.zIndex = nextZ();
  el.innerHTML = `
    <div class="popup-header">
      <span class="pin-icon">📌</span>
      <span class="popup-tool-name">${escHtml(d.tool_name)}</span>
      <span class="popup-hint">drag to move</span>
      <button class="popup-close-btn" title="Close">✕</button>
    </div>
    <div class="popup-body">${popupBodyHTML(d)}</div>
  `;
  document.body.appendChild(el);

  const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
  path.setAttribute("stroke", "#f59e0b");
  path.setAttribute("stroke-width", "1.8");
  path.setAttribute("stroke-dasharray", "6 3");
  path.setAttribute("fill", "none");
  path.setAttribute("stroke-linecap", "round");
  path.setAttribute("opacity", "0.85");
  svgOverlay.appendChild(path);

  PINNED[nid] = { el, path };

  // spawn offset from click point
  const pw = 340;
  const vw = window.innerWidth, vh = window.innerHeight;
  let left = spawnX + 24, top = spawnY - 50;
  if (left + pw > vw - 8) left = spawnX - pw - 24;
  if (top < 8) top = 8;
  if (top + 360 > vh - 8) top = vh - 368;
  el.style.left = left + "px";
  el.style.top  = top  + "px";

  el.querySelector(".popup-close-btn").addEventListener("click", () => {
    el.remove();
    path.remove();
    delete PINNED[nid];
  });

  makeDraggable(el, nid);
}

      { x: e.touches[1].clientX, y: e.touches[1].clientY },
    ];
    _pinchPrev = Math.hypot(
      e.touches[1].clientX - e.touches[0].clientX,
      e.touches[1].clientY - e.touches[0].clientY,
    );
  }
}, { passive: false });

container.addEventListener("touchmove", e => {
  if (e.touches.length !== 2) return;
  e.preventDefault();

  const t0 = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  const t1 = { x: e.touches[1].clientX, y: e.touches[1].clientY };

  // ── Pan: translate by midpoint delta ──────────────────────────────────
  if (_touchPrev) {
    const prevMid = {
      x: (_touchPrev[0].x + _touchPrev[1].x) / 2,
      y: (_touchPrev[0].y + _touchPrev[1].y) / 2,
    };
    const curMid = { x: (t0.x + t1.x) / 2, y: (t0.y + t1.y) / 2 };
    const dx = curMid.x - prevMid.x;
    const dy = curMid.y - prevMid.y;
    const scale = network.getScale();
    const pos   = network.getViewPosition();
    network.moveTo({
      position: { x: pos.x - dx / scale, y: pos.y - dy / scale },
      animation: false,
    });
  }

  // ── Zoom: scale by pinch ratio, anchored at midpoint ──────────────────
  const dist = Math.hypot(t1.x - t0.x, t1.y - t0.y);
  if (_pinchPrev && _pinchPrev > 0) {
    const ratio    = dist / _pinchPrev;
    const newScale = Math.min(Math.max(network.getScale() * ratio, 0.05), 5);
    network.moveTo({ scale: newScale, animation: false });
  }

  _touchPrev = [t0, t1];
  _pinchPrev = dist;
}, { passive: false });

container.addEventListener("touchend", e => {
  if (e.touches.length < 2) {
    _touchPrev = null;
    _pinchPrev = null;
  }
});

// ── Initial view ──────────────────────────────────────────────────────────
// The final calculate_lc and generate_structured_report are the payoff of
// the run; amber highlight so the eye lands there first.
const FINAL_IDS = ["h2bftj5y", "fil5kj3q"];
dsNodes.update(FINAL_IDS.map(id => ({
  id,
  borderWidth: 3,
  color: {
    background: "#3b2a08",
    border:     "#f59e0b",
    highlight: { background: "#4d3a10", border: "#fbbf24" },
    hover:     { background: "#453310", border: "#fbbf24" },
  },
  font: { color: "#fde68a", face: "'Fira Code',monospace", size: 13,
          bold: { color: "#fde68a", mod: "bold" } },
  shadow: { enabled: true, color: "#f59e0b66", size: 16, x: 0, y: 0 },
})));

// The two roots land far left of the graph's mass under the hierarchical
// layout; pull them right to sit at the same x as the production
// write_QE_script_w_ASE node (o7vvzth0), above the final calculate_lc
// funnel. Together with the amber finals this puts the whole story arc
// (roots -> jobs -> lattice constant -> report) in one column.
function moveRootsAboveFinal() {
  const anchor = network.getPositions(["o7vvzth0"])["o7vvzth0"];
  if (!anchor) return;
  ROOT_IDS.forEach(rid => {
    const y = network.getPositions([rid])[rid].y;
    network.moveNode(rid, anchor.x, y);
  });
}

network.once("afterDrawing", () => {
  moveRootsAboveFinal();
  // Initial camera: the vertical slice from the green roots down to the
  // amber report, with the node detail panel already populated.
  // The Fit button still shows the whole graph.
  network.selectNodes(["h2bftj5y"]);
  showDetail("h2bftj5y");
  const focusIds = [...ROOT_IDS, ...FINAL_IDS,
    ...(NODE_DATA["h2bftj5y"] ? NODE_DATA["h2bftj5y"].parent_ids : [])];
  network.fit({ nodes: focusIds, animation: false });
  // Cap the zoom so labels stay readable but context is not lost.
  if (network.getScale() > 0.9) network.moveTo({ scale: 0.9 });
});
</script>
